sonar.projectKey=fastapi-cicd
sonar.projectName=FastAPI CI/CD
sonar.projectVersion=1.0

# Source and test paths
sonar.sources=app
sonar.tests=tests

# Language
sonar.language=py

# Coverage report (generated by pytest-cov --cov-report=xml)
sonar.python.coverage.reportPaths=coverage.xml

# Block the pipeline if the quality gate fails
sonar.qualitygate.wait=true
