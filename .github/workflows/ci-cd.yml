name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Stage 1: Lint ────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install ruff
        shell: pwsh
        run: python -m pip install ruff --quiet

      - name: Lint with ruff
        shell: pwsh
        run: python -m ruff check app/ tests/

  # ── Stage 2: Test ────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: self-hosted
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        shell: pwsh
        run: python -m pip install -r requirements.txt --quiet

      - name: Run pytest with coverage
        shell: pwsh
        run: python -m pytest tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ── Stage 3: Build ───────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: self-hosted
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        shell: pwsh
        run: docker build -t fastapi-app:latest .

  # ── Stage 4: SonarQube Scan (quality gate blocks deploy on failure) ──────
  sonarqube-scan:
    name: SonarQube Scan
    runs-on: self-hosted
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Run SonarQube scan
        shell: pwsh
        # Runs sonar-scanner-cli in Docker, sharing the sonarqube container's
        # network namespace so that localhost:9000 resolves correctly.
        # sonar.qualitygate.wait=true (in sonar-project.properties) causes this
        # step — and therefore the entire pipeline — to fail if the gate is not met.
        run: |
          docker run --rm `
            --network container:sonarqube `
            -v "${env:GITHUB_WORKSPACE}:/usr/src" `
            -e SONAR_HOST_URL="http://localhost:9000" `
            -e SONAR_TOKEN="${{ secrets.SONAR_TOKEN }}" `
            sonarsource/sonar-scanner-cli:latest

  # ── Stage 5: Deploy (Blue-Green) ─────────────────────────────────────────
  deploy:
    name: Deploy (Blue-Green)
    runs-on: self-hosted
    needs: sonarqube-scan
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Run blue-green deploy
        shell: bash
        run: bash deploy.sh
